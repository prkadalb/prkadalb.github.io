<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditi's Abacus</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --wood: #8b5a2b;
            --wood-light: #b37d4e;
            
            /* Kid friendly bead colors per column */
            --col-1000: #38bdf8;
            --col-100: #4ade80;
            --col-10: #facc15;
            --col-1: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .title-bar {
            width: 100%;
            max-width: 1100px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .title-bar h1 {
            font-size: 2.5rem;
            color: #ec4899;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* Dashboard Layout */
        .header-panel {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 4px solid #334155;
            margin-bottom: 1rem;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        #current-op {
            color: #ec4899;
            transition: transform 0.2s ease;
        }

        #current-total {
            color: #22c55e;
        }

        /* Main Workspace */
        .workspace {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin: 1rem 0;
        }

        #abacus-container {
            width: 100%;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        svg {
            width: 100%;
            height: auto;
            border-radius: 16px;
        }

        /* Control Tray at Bottom */
        .control-panel {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 4px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .generator-row {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            background: #0f172a;
            padding: 1rem;
            border-radius: 16px;
            border: 3px solid #475569;
        }

        select {
            background: #1e293b;
            color: #fff;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .input-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #0f172a;
            border: 3px solid #475569;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            color: #fff;
            font-size: 1.8rem;
            font-family: inherit;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            font-weight: bold;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 16px;
            color: white;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 var(--shadow, #1e3a8a);
            transform: translateY(0);
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--shadow, #1e3a8a);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--shadow, #1e3a8a);
        }

        #btn-play { background: #22c55e; --shadow: #15803d; }
        #btn-pause { background: #eab308; --shadow: #a16207; }
        #btn-reset { background: #ef4444; --shadow: #b91c1c; }
        #btn-prev { background: #8b5cf6; --shadow: #5b21b6; }
        #btn-next { background: #06b6d4; --shadow: #0891b2; }

        .speed-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #0f172a;
            padding: 0.5rem 1.5rem;
            border-radius: 16px;
            border: 3px solid #475569;
        }

        .speed-box label {
            font-size: 1rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        input[type="range"] {
            accent-color: #3b82f6;
            cursor: pointer;
            width: 120px;
        }

        /* Tracker / History Bar */
        .step-tracker {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            width: 100%;
            padding: 0.5rem;
            background: #0f172a;
            border-radius: 14px;
            min-height: 50px;
        }

        .tracker-pill {
            background: #334155;
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            transition: all 0.3s;
            cursor: pointer;
        }

        .tracker-pill.active {
            background: #ec4899;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }

        @media (min-width: 1200px) {
            body { padding: 2rem; }
            .stat-value { font-size: 5rem; }
            .stat-label { font-size: 1.4rem; }
            input[type="text"] { font-size: 2.2rem; }
            button { font-size: 1.6rem; padding: 1.25rem 2.5rem; }
            .title-bar h1 { font-size: 3.5rem; }
            select { font-size: 1.4rem; }
        }

        @media (max-width: 600px) {
            .header-panel { padding: 1rem; flex-direction: column; gap: 1rem;}
            .stat-box { text-align: center !important; }
            .stat-value { font-size: 2.2rem; }
            .stat-label { font-size: 0.8rem; }
            input[type="text"] { font-size: 1.5rem; padding: 0.75rem; }
            button { font-size: 1.1rem; padding: 0.75rem 1.2rem; }
            .control-panel { padding: 1rem; gap: 0.75rem; }
            .input-row { flex-direction: column; }
            input[type="range"] { width: 100%; }
            .speed-box { width: 100%; justify-content: space-between; }
            .title-bar h1 { font-size: 2rem; }
            .generator-row { flex-direction: column; align-items: stretch;}
            .generator-row button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <h1>Aditi's Abacus</h1>
    </div>

    <div class="header-panel">
        <div class="stat-box" style="flex: 1; text-align: left;">
            <div class="stat-label">Instruction</div>
            <div class="stat-value" id="current-op" style="font-size: 3rem;">Ready</div>
        </div>
        <div class="stat-box" style="flex: 1; text-align: right;">
            <div class="stat-label">Abacus Count</div>
            <div class="stat-value" id="current-total">0</div>
        </div>
    </div>

    <div class="workspace">
        <div id="abacus-container"></div>
    </div>

    <div class="control-panel">
        
        <div class="generator-row">
            <select id="level-select">
                <option value="1">Level 1 (Basic 1-Digit)</option>
                <option value="2">Level 2 (Up to 2-Digits)</option>
                <option value="3">Level 3 (Up to 3-Digits)</option>
                <option value="4">Level 4 (Up to 4-Digits)</option>
            </select>
            <button id="btn-prev" disabled>⬅ Prev Question</button>
            <button id="btn-next">Next Question ➡</button>
        </div>

        <div class="input-row">
            <input type="text" id="expr-input" value="1 + 3 + 8 - 5" placeholder="Enter math formula here...">
            <div class="speed-box">
                <label for="speed-slider">Speed</label>
                <input type="range" id="speed-slider" min="1000" max="4000" step="200" value="2200">
            </div>
        </div>

        <div class="btn-group">
            <button id="btn-play">▶ Play Animation</button>
            <button id="btn-pause" style="display: none;">⏸ Pause</button>
            <button id="btn-reset">⏮ Reset</button>
        </div>

        <div class="step-tracker" id="tracker-bar"></div>
    </div>

    <script>
        let audioCtx = null;

        function playClackSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.06);
                
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
                
                const clickOsc = audioCtx.createOscillator();
                const clickGain = audioCtx.createGain();
                clickOsc.type = 'sine';
                clickOsc.frequency.setValueAtTime(800, audioCtx.currentTime);
                clickOsc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.015);
                
                clickGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                clickGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.015);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                clickOsc.connect(clickGain);
                clickGain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.06);
                
                clickOsc.start();
                clickOsc.stop(audioCtx.currentTime + 0.016);
            } catch(e) {
                // Audio silent fallback
            }
        }

        const svgWidth = 1000;
        const svgHeight = 600;

        const columns = [
            { id: 'thousands', x: 280, color: 'var(--col-1000)', text: '1000s' },
            { id: 'hundreds',  x: 420, color: 'var(--col-100)',  text: '100s' },
            { id: 'tens',      x: 560, color: 'var(--col-10)',   text: '10s' },
            { id: 'ones',      x: 700, color: 'var(--col-1)',    text: '1s' }
        ];

        const frameLeft = 160;
        const frameRight = 820;
        const beamY = 190;
        const frameTop = 50;
        const frameBottom = 550;

        const beadRx = 54;
        const beadRy = 18;

        let engineSteps = [];
        let activeStepIndex = 0;
        let playbackTimer = null;
        let isRunning = false;

        // Question Generation State
        let questionHistory = [];
        let historyIndex = -1;

        const svg = d3.select("#abacus-container")
            .append("svg")
            .attr("viewBox", `0 0 ${svgWidth} ${svgHeight}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        function drawAbacusShell() {
            svg.append("rect")
                .attr("x", frameLeft - 40)
                .attr("y", frameTop - 20)
                .attr("width", (frameRight - frameLeft) + 80)
                .attr("height", (frameBottom - frameTop) + 40)
                .attr("fill", "#1c1917")
                .attr("rx", 20);

            svg.selectAll(".rod-wire")
                .data(columns)
                .enter()
                .append("line")
                .attr("class", "rod-wire")
                .attr("x1", d => d.x)
                .attr("y1", frameTop)
                .attr("x2", d => d.x)
                .attr("y2", frameBottom)
                .attr("stroke", "#64748b")
                .attr("stroke-width", 8);

            svg.append("rect")
                .attr("x", frameLeft - 30)
                .attr("y", frameTop - 15)
                .attr("width", (frameRight - frameLeft) + 60)
                .attr("height", (frameBottom - frameTop) + 30)
                .attr("fill", "none")
                .attr("stroke", "var(--wood)")
                .attr("stroke-width", 24)
                .attr("rx", 12);

            svg.append("rect")
                .attr("x", frameLeft - 42)
                .attr("y", frameTop - 27)
                .attr("width", (frameRight - frameLeft) + 84)
                .attr("height", (frameBottom - frameTop) + 54)
                .attr("fill", "none")
                .attr("stroke", "var(--wood-light)")
                .attr("stroke-width", 4)
                .attr("rx", 16);

            svg.append("line")
                .attr("x1", frameLeft - 30)
                .attr("y1", beamY)
                .attr("x2", frameRight + 30)
                .attr("y2", beamY)
                .attr("stroke", "var(--wood)")
                .attr("stroke-width", 20);

            svg.append("line")
                .attr("x1", frameLeft - 30)
                .attr("y1", beamY)
                .attr("x2", frameRight + 30)
                .attr("y2", beamY)
                .attr("stroke", "var(--wood-light)")
                .attr("stroke-width", 4);

            svg.selectAll(".col-tag")
                .data(columns)
                .enter()
                .append("text")
                .attr("x", d => d.x)
                .attr("y", frameBottom + 45)
                .attr("text-anchor", "middle")
                .attr("fill", "var(--text-muted)")
                .attr("font-size", "1.3rem")
                .attr("font-weight", "bold")
                .text(d => d.text);

            svg.selectAll(".col-val-text")
                .data(columns)
                .enter()
                .append("text")
                .attr("class", "col-val-text")
                .attr("id", d => `val-text-${d.id}`)
                .attr("x", d => d.x)
                .attr("y", frameTop - 30)
                .attr("text-anchor", "middle")
                .attr("fill", d => d.color)
                .attr("font-size", "2.5rem")
                .attr("font-weight", "900")
                .text("0");
        }

        function getUpperY(isActive) {
            return isActive ? (beamY - beadRy - 14) : (frameTop + beadRy + 14);
        }

        function getLowerY(beadIndex, activeCount) {
            const gap = 2;
            const beadHeight = beadRy * 2 + gap;
            if (beadIndex < activeCount) {
                return beamY + beadRy + 14 + (beadIndex * beadHeight);
            } else {
                return frameBottom - beadRy - 14 - ((3 - beadIndex) * beadHeight);
            }
        }

        function computeBeadLayout(targetInteger) {
            let rem = targetInteger;
            const positions = {};
            const divs = { thousands: 1000, hundreds: 100, tens: 10, ones: 1 };
            for (let k in divs) {
                let digit = Math.floor(rem / divs[k]);
                positions[k] = {
                    digit: digit,
                    upperActive: digit >= 5,
                    lowerActiveCount: digit % 5
                };
                rem %= divs[k];
            }
            return positions;
        }

        function compileDataset(layoutState) {
            const list = [];
            columns.forEach(col => {
                const state = layoutState[col.id];
                list.push({
                    id: `${col.id}-upper`,
                    cx: col.x,
                    cy: getUpperY(state.upperActive),
                    color: col.color
                });
                for (let i = 0; i < 4; i++) {
                    list.push({
                        id: `${col.id}-lower-${i}`,
                        cx: col.x,
                        cy: getLowerY(i, state.lowerActiveCount),
                        color: col.color
                    });
                }
            });
            return list;
        }

        function refreshAbacusVisuals(totalValue, runAnimation = true) {
            const currentLayout = computeBeadLayout(totalValue);
            const beadData = compileDataset(currentLayout);

            columns.forEach(col => {
                d3.select(`#val-text-${col.id}`).text(currentLayout[col.id].digit);
            });

            const targetElements = svg.selectAll(".bead-unit")
                .data(beadData, d => d.id);

            const elementsEntered = targetElements.enter()
                .append("g")
                .attr("class", "bead-unit");

            elementsEntered.append("ellipse")
                .attr("class", "bead-main")
                .attr("cx", d => d.cx)
                .attr("cy", d => d.cy)
                .attr("rx", beadRx)
                .attr("ry", beadRy)
                .attr("fill", d => d.color)
                .attr("stroke", "#0f172a")
                .attr("stroke-width", 3);

            elementsEntered.append("ellipse")
                .attr("class", "bead-highlight")
                .attr("cx", d => d.cx)
                .attr("cy", d => d.cy - 4)
                .attr("rx", beadRx - 6)
                .attr("ry", beadRy - 4)
                .attr("fill", "rgba(255,255,255,0.25)")
                .style("pointer-events", "none");

            elementsEntered.append("line")
                .attr("class", "bead-ridge")
                .attr("x1", d => d.cx - beadRx)
                .attr("y1", d => d.cy)
                .attr("x2", d => d.cx + beadRx)
                .attr("y2", d => d.cy)
                .attr("stroke", "rgba(0,0,0,0.3)")
                .attr("stroke-width", 2)
                .style("pointer-events", "none");

            const absoluteGroup = elementsEntered.merge(targetElements);
            const tDuration = runAnimation ? 550 : 0;

            if (runAnimation) playClackSound();

            absoluteGroup.select(".bead-main")
                .transition()
                .duration(tDuration)
                .ease(d3.easeCubicOut)
                .attr("cy", d => d.cy);

            absoluteGroup.select(".bead-highlight")
                .transition()
                .duration(tDuration)
                .ease(d3.easeCubicOut)
                .attr("cy", d => d.cy - 4);

            absoluteGroup.select(".bead-ridge")
                .transition()
                .duration(tDuration)
                .ease(d3.easeCubicOut)
                .attr("y1", d => d.cy)
                .attr("y2", d => d.cy);
        }

        function parseMathExpression(rawInput) {
            const formula = rawInput.replace(/\s+/g, '');
            const tokens = formula.match(/([+-]?\d+)/g);
            
            const generatedSteps = [{ label: 'Start', opText: 'Start', value: 0, aggregate: 0 }];
            if (!tokens) return generatedSteps;

            let currentSum = 0;
            tokens.forEach((token, index) => {
                let itemVal = parseInt(token, 10);
                if (index === 0 && !token.startsWith("-") && !token.startsWith("+")) {
                    itemVal = Math.abs(itemVal);
                }
                currentSum += itemVal;
                
                if (currentSum < 0) currentSum = 0;
                if (currentSum > 9999) currentSum = 9999;

                generatedSteps.push({
                    label: token.startsWith("+") || token.startsWith("-") ? token : `+${token}`,
                    opText: itemVal >= 0 ? `Add ${Math.abs(itemVal)}` : `Subtract ${Math.abs(itemVal)}`,
                    value: itemVal,
                    aggregate: currentSum
                });
            });

            return generatedSteps;
        }

        // --- Random Question Generation Engine ---
        function generateRandomQuestion() {
            const level = parseInt(document.getElementById("level-select").value);
            let numTerms = 3;
            let maxVal = 9;
            
            if (level === 1) { numTerms = 4; maxVal = 9; }
            else if (level === 2) { numTerms = 4; maxVal = 99; }
            else if (level === 3) { numTerms = 5; maxVal = 999; }
            else if (level === 4) { numTerms = 5; maxVal = 9999; }

            let currentSum = 0;
            let expr = "";

            for (let i = 0; i < numTerms; i++) {
                let isAdd = Math.random() > 0.5;
                let val = 0;

                if (i === 0) {
                    val = Math.floor(Math.random() * maxVal) + 1;
                    currentSum += val;
                    expr += val;
                } else {
                    if (currentSum === 0) isAdd = true;
                    if (currentSum === 9999) isAdd = false;

                    if (isAdd) {
                        let maxAdd = Math.min(maxVal, 9999 - currentSum);
                        if (maxAdd < 1) {
                            // Force Subtraction if no room to add
                            isAdd = false;
                            let maxSub = Math.min(maxVal, currentSum);
                            val = Math.floor(Math.random() * maxSub) + 1;
                            currentSum -= val;
                            expr += " - " + val;
                        } else {
                            val = Math.floor(Math.random() * maxAdd) + 1;
                            currentSum += val;
                            expr += " + " + val;
                        }
                    } else {
                        let maxSub = Math.min(maxVal, currentSum);
                        if (maxSub < 1) {
                            // Force Addition if no room to subtract
                            isAdd = true;
                            let maxAdd = Math.min(maxVal, 9999 - currentSum);
                            val = Math.floor(Math.random() * maxAdd) + 1;
                            currentSum += val;
                            expr += " + " + val;
                        } else {
                            val = Math.floor(Math.random() * maxSub) + 1;
                            currentSum -= val;
                            expr += " - " + val;
                        }
                    }
                }
            }
            return expr;
        }

        function syncHistoryButtons() {
            document.getElementById("btn-prev").disabled = historyIndex <= 0;
        }

        function loadNextQuestion() {
            if (historyIndex < questionHistory.length - 1) {
                historyIndex++;
            } else {
                const newQ = generateRandomQuestion();
                questionHistory.push(newQ);
                historyIndex++;
            }
            applyQuestionToUI(questionHistory[historyIndex]);
            syncHistoryButtons();
        }

        function loadPrevQuestion() {
            if (historyIndex > 0) {
                historyIndex--;
                applyQuestionToUI(questionHistory[historyIndex]);
                syncHistoryButtons();
            }
        }

        function applyQuestionToUI(qString) {
            d3.select("#expr-input").property("value", qString);
            
            // Halt any running animations safely
            isRunning = false;
            clearTimeout(playbackTimer);
            toggleControlButtons();
            
            engineSteps = parseMathExpression(qString);
            activeStepIndex = 0;
            buildTrackerInterface();
            renderActiveStepContext(true);
        }

        function buildTrackerInterface() {
            const bar = d3.select("#tracker-bar");
            bar.html(""); 
            
            engineSteps.forEach((step, idx) => {
                bar.append("div")
                    .attr("class", `tracker-pill ${idx === activeStepIndex ? 'active' : ''}`)
                    .attr("id", `pill-${idx}`)
                    .text(step.label)
                    .on("click", () => {
                        jumpToStep(idx);
                    });
            });
        }

        function syncTimelineHighlight() {
            d3.selectAll(".tracker-pill").classed("active", false);
            d3.select(`#pill-${activeStepIndex}`).classed("active", true);
            
            const activeNode = document.getElementById(`pill-${activeStepIndex}`);
            if (activeNode) {
                activeNode.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function executeSequenceLoop() {
            if (!isRunning) return;

            if (activeStepIndex >= engineSteps.length - 1) {
                isRunning = false;
                toggleControlButtons();
                return;
            }

            activeStepIndex++;
            renderActiveStepContext(true);

            const delayDuration = parseInt(d3.select("#speed-slider").property("value"), 10);
            playbackTimer = setTimeout(executeSequenceLoop, delayDuration);
        }

        function renderActiveStepContext(animate = false) {
            const activeData = engineSteps[activeStepIndex];
            
            const instructionLabel = d3.select("#current-op");
            instructionLabel.text(activeData.opText);
            
            if (activeData.value > 0) { instructionLabel.style("color", "#4ade80"); }
            else if (activeData.value < 0) { instructionLabel.style("color", "#f87171"); }
            else { instructionLabel.style("color", "var(--text-main)"); }

            d3.select("#current-total").text(activeData.aggregate);

            syncTimelineHighlight();
            refreshAbacusVisuals(activeData.aggregate, animate);
        }

        function jumpToStep(targetIndex) {
            if (isRunning) {
                isRunning = false;
                clearTimeout(playbackTimer);
            }
            activeStepIndex = targetIndex;
            renderActiveStepContext(true);
            toggleControlButtons();
        }

        function toggleControlButtons() {
            d3.select("#btn-play").style("display", isRunning ? "none" : "inline-block");
            d3.select("#btn-pause").style("display", isRunning ? "inline-block" : "none");
        }

        function registerActionListeners() {
            // New Generator listeners
            d3.select("#btn-next").on("click", loadNextQuestion);
            d3.select("#btn-prev").on("click", loadPrevQuestion);
            
            // Changing level automatically loads a new question of that level
            d3.select("#level-select").on("change", () => {
                const newQ = generateRandomQuestion();
                questionHistory.push(newQ);
                historyIndex = questionHistory.length - 1;
                applyQuestionToUI(newQ);
                syncHistoryButtons();
            });

            d3.select("#btn-play").on("click", () => {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                if (engineSteps.length <= 1) return;
                
                if (activeStepIndex >= engineSteps.length - 1) {
                    activeStepIndex = 0;
                    renderActiveStepContext(false); 
                }
                
                isRunning = true;
                toggleControlButtons();
                
                setTimeout(executeSequenceLoop, 400);
            });

            d3.select("#btn-pause").on("click", () => {
                isRunning = false;
                clearTimeout(playbackTimer);
                toggleControlButtons();
            });

            d3.select("#btn-reset").on("click", () => {
                isRunning = false;
                clearTimeout(playbackTimer);
                activeStepIndex = 0;
                renderActiveStepContext(true);
                toggleControlButtons();
            });

            d3.select("#expr-input").on("input", function() {
                const query = d3.select(this).property("value");
                // We add manual edits as a new history item so kid doesn't lose them
                questionHistory.push(query);
                historyIndex = questionHistory.length - 1;
                syncHistoryButtons();
                
                engineSteps = parseMathExpression(query);
                activeStepIndex = 0;
                buildTrackerInterface();
                renderActiveStepContext(true);
            });
        }

        window.addEventListener("DOMContentLoaded", () => {
            drawAbacusShell();
            
            // Initialize with a randomly generated question at Level 1
            const firstQ = generateRandomQuestion();
            questionHistory.push(firstQ);
            historyIndex = 0;
            
            d3.select("#expr-input").property("value", firstQ);
            engineSteps = parseMathExpression(firstQ);
            
            buildTrackerInterface();
            renderActiveStepContext(false);
            registerActionListeners();
            toggleControlButtons();
            syncHistoryButtons();
        });
    </script>
</body>
</html>
