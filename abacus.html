<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aditi's Abacus</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --wood: #8b5a2b;
            --wood-light: #b37d4e;
            
            --col-1000: #38bdf8;
            --col-100: #4ade80;
            --col-10: #facc15;
            --col-1: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', system-ui, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Prevent overflow entirely */
        }

        /* --- Dynamic Orientation Layout --- */
        #app {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: clamp(0.25rem, 1vh, 1rem);
            gap: clamp(0.5rem, 1.5vh, 1rem);
        }

        #left-pane, #right-pane {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
        }

        /* Landscape Mode: Side by Side */
        @media (orientation: landscape) {
            #app {
                flex-direction: row;
            }
            #left-pane {
                flex: 5.5; /* 55% width */
                gap: clamp(0.25rem, 1vh, 0.5rem);
            }
            #right-pane {
                flex: 4.5; /* 45% width */
                justify-content: center;
            }
            .title-bar {
                text-align: left;
                margin-left: 1rem;
            }
        }

        /* Portrait Mode: Stacked */
        @media (orientation: portrait) {
            #app {
                flex-direction: column;
            }
            #left-pane {
                flex: 1; /* Takes available space */
                gap: clamp(0.25rem, 1vh, 0.5rem);
            }
            #right-pane {
                flex: 0 0 auto; /* Hugs content */
            }
            .title-bar {
                text-align: center;
            }
        }

        /* --- Component Sizing (Using Clamps to guarantee fitting) --- */
        .title-bar h1 {
            font-size: clamp(1.2rem, 4vh, 2.5rem);
            color: #ec4899;
            text-shadow: 2px 2px 0px #fff, 3px 3px 0px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            margin-bottom: clamp(0rem, 0.5vh, 0.5rem);
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: clamp(0.4rem, 1.5vh, 1.5rem) clamp(0.5rem, 2vw, 2rem);
            border-radius: clamp(10px, 2vh, 24px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: clamp(2px, 0.5vh, 4px) solid #334155;
            flex-shrink: 0;
        }

        .stat-box { text-align: center; flex: 1; }
        .stat-box:first-child { text-align: left; }
        .stat-box:last-child { text-align: right; }

        .stat-label {
            font-size: clamp(0.6rem, 1.5vh, 1.1rem);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: clamp(0.1rem, 0.5vh, 0.25rem);
        }

        #current-op {
            font-size: clamp(1.2rem, 4.5vh, 3rem);
            color: #ec4899;
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        #current-total {
            font-size: clamp(1.5rem, 5vh, 3.5rem);
            color: #22c55e;
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        #abacus-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
        }

        .control-panel {
            background: var(--card-bg);
            padding: clamp(0.5rem, 1.5vh, 1.5rem);
            border-radius: clamp(12px, 2vh, 24px);
            border: clamp(2px, 0.5vh, 4px) solid #334155;
            display: flex;
            flex-direction: column;
            gap: clamp(0.4rem, 1.5vh, 1.25rem);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .generator-row {
            display: flex;
            gap: clamp(0.25rem, 1vw, 1rem);
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            background: #0f172a;
            padding: clamp(0.4rem, 1.5vh, 1rem);
            border-radius: clamp(10px, 1.5vh, 16px);
            border: clamp(2px, 0.4vh, 3px) solid #475569;
        }

        select {
            background: #1e293b;
            color: #fff;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            padding: clamp(0.2rem, 1vh, 0.75rem) clamp(0.25rem, 1vw, 1rem);
            font-size: clamp(0.8rem, 2vh, 1.2rem);
            font-family: inherit;
            cursor: pointer;
            outline: none;
            flex: 1;
        }

        .input-row {
            display: flex;
            gap: clamp(0.25rem, 1vw, 1rem);
            width: 100%;
            align-items: stretch;
        }

        input[type="text"] {
            flex-grow: 1;
            min-width: 0;
            background: #0f172a;
            border: clamp(2px, 0.4vh, 3px) solid #475569;
            border-radius: clamp(10px, 1.5vh, 16px);
            padding: clamp(0.4rem, 1.5vh, 1rem);
            color: #fff;
            font-size: clamp(1.2rem, 3.5vh, 1.8rem);
            font-family: inherit;
            letter-spacing: 1px;
            text-align: center;
            outline: none;
            font-weight: bold;
        }

        input[type="text"]:focus { border-color: #3b82f6; }

        .speed-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.25rem, 1vw, 1rem);
            background: #0f172a;
            padding: clamp(0.25rem, 1vh, 0.5rem) clamp(0.5rem, 1vw, 1.5rem);
            border-radius: clamp(10px, 1.5vh, 16px);
            border: clamp(2px, 0.4vh, 3px) solid #475569;
        }

        .speed-box label {
            font-size: clamp(0.75rem, 1.5vh, 1rem);
            color: var(--text-muted);
            white-space: nowrap;
        }

        input[type="range"] {
            accent-color: #3b82f6;
            cursor: pointer;
            width: clamp(60px, 10vw, 120px);
        }

        .btn-group {
            display: flex;
            gap: clamp(0.25rem, 1vw, 0.75rem);
            justify-content: center;
            align-items: center;
        }

        button {
            flex: 1;
            cursor: pointer;
            border: none;
            padding: clamp(0.4rem, 1.5vh, 1rem) clamp(0.4rem, 1vw, 1rem);
            font-size: clamp(0.85rem, 2vh, 1.3rem);
            font-weight: bold;
            font-family: inherit;
            border-radius: clamp(8px, 1.5vh, 16px);
            color: white;
            transition: all 0.1s ease;
            box-shadow: 0 clamp(3px, 0.6vh, 6px) 0 var(--shadow, #1e3a8a);
            transform: translateY(0);
            white-space: nowrap;
        }

        button:active {
            transform: translateY(clamp(3px, 0.6vh, 6px));
            box-shadow: 0 0px 0 var(--shadow, #1e3a8a);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(clamp(3px, 0.6vh, 6px));
            box-shadow: 0 0px 0 var(--shadow, #1e3a8a);
        }

        #btn-play { background: #22c55e; --shadow: #15803d; }
        #btn-pause { background: #eab308; --shadow: #a16207; }
        #btn-reset { background: #ef4444; --shadow: #b91c1c; }
        #btn-prev { background: #8b5cf6; --shadow: #5b21b6; }
        #btn-next { background: #06b6d4; --shadow: #0891b2; }

        .step-tracker {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            width: 100%;
            padding: clamp(0.25rem, 1vh, 0.5rem);
            background: #0f172a;
            border-radius: clamp(8px, 1vh, 14px);
            min-height: clamp(30px, 5vh, 50px);
        }

        .tracker-pill {
            background: #334155;
            padding: clamp(0.2rem, 0.5vh, 0.4rem) clamp(0.5rem, 1vw, 1rem);
            border-radius: 9999px;
            font-size: clamp(0.75rem, 1.5vh, 1.1rem);
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            transition: all 0.3s;
            cursor: pointer;
        }

        .tracker-pill.active {
            background: #ec4899;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="left-pane">
            <div class="title-bar">
                <h1>Aditi's Abacus</h1>
            </div>

            <div class="header-panel">
                <div class="stat-box">
                    <div class="stat-label">Instruction</div>
                    <div id="current-op">Ready</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Count</div>
                    <div id="current-total">0</div>
                </div>
            </div>

            <div class="workspace">
                <div id="abacus-container"></div>
            </div>
        </div>

        <div id="right-pane">
            <div class="control-panel">
                
                <div class="generator-row">
                    <select id="level-select">
                        <option value="1">Level 1 (1-Digit)</option>
                        <option value="2">Level 2 (Up to 2-Digits)</option>
                        <option value="3">Level 3 (Up to 3-Digits)</option>
                        <option value="4">Level 4 (Up to 4-Digits)</option>
                    </select>
                    <button id="btn-prev" disabled>⬅ Prev</button>
                    <button id="btn-next">Next ➡</button>
                </div>

                <div class="input-row">
                    <input type="text" id="expr-input" value="1 + 3 + 8 - 5" placeholder="Formula...">
                    <div class="speed-box">
                        <label for="speed-slider">Speed</label>
                        <input type="range" id="speed-slider" min="1000" max="4000" step="200" value="2200">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="btn-play">▶ Play</button>
                    <button id="btn-pause" style="display: none;">⏸ Pause</button>
                    <button id="btn-reset">⏮ Reset</button>
                </div>

                <div class="step-tracker" id="tracker-bar"></div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        // --- Tone Generation Engine ---
        function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            } catch(e) {
                return null;
            }
        }

        function playClackSound() {
            const ctx = getAudioContext();
            if (!ctx) return;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(160, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.06);
            
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
            
            const clickOsc = ctx.createOscillator();
            const clickGain = ctx.createGain();
            clickOsc.type = 'sine';
            clickOsc.frequency.setValueAtTime(800, ctx.currentTime);
            clickOsc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.015);
            
            clickGain.gain.setValueAtTime(0.15, ctx.currentTime);
            clickGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.015);

            osc.connect(gain);
            gain.connect(ctx.destination);
            
            clickOsc.connect(clickGain);
            clickGain.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.06);
            
            clickOsc.start();
            clickOsc.stop(ctx.currentTime + 0.016);
        }

        // New: Simple beep for waiting periods
        function playBeep() {
            const ctx = getAudioContext();
            if (!ctx) return;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        }

        function playQuestionTone(direction) {
            const ctx = getAudioContext();
            if (!ctx) return;
            
            const now = ctx.currentTime;
            const freqs = direction === 'next' ? [440, 554.37, 659.25] : [659.25, 554.37, 440];
            
            freqs.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + i * 0.12);
                
                gain.gain.setValueAtTime(0, now + i * 0.12);
                gain.gain.linearRampToValueAtTime(0.15, now + i * 0.12 + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.15);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now + i * 0.12);
                osc.stop(now + i * 0.12 + 0.16);
            });
        }

        // --- Web Speech API System ---
        function speak(text, callback) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0; 
                utterance.pitch = 1.1;
                if (callback) {
                    utterance.onend = callback;
                }
                window.speechSynthesis.speak(utterance);
            } else {
                if (callback) callback();
            }
        }

        function cancelSpeech() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // --- Abacus UI System ---
        const svgWidth = 1000;
        const svgHeight = 600;

        const columns = [
            { id: 'thousands', x: 280, color: 'var(--col-1000)', text: '1000s' },
            { id: 'hundreds',  x: 420, color: 'var(--col-100)',  text: '100s' },
            { id: 'tens',      x: 560, color: 'var(--col-10)',   text: '10s' },
            { id: 'ones',      x: 700, color: 'var(--col-1)',    text: '1s' }
        ];

        const frameLeft = 160;
        const frameRight = 820;
        const beamY = 190;
        const frameTop = 50;
        const frameBottom = 550;
        const beadRx = 54;
        const beadRy = 18;

        let engineSteps = [];
        let activeStepIndex = 0;
        let playbackTimer = null;
        let isRunning = false;

        let questionHistory = [];
        let historyIndex = -1;

        const svg = d3.select("#abacus-container")
            .append("svg")
            .attr("viewBox", `0 0 ${svgWidth} ${svgHeight}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        function drawAbacusShell() {
            svg.append("rect")
                .attr("x", frameLeft - 40)
                .attr("y", frameTop - 20)
                .attr("width", (frameRight - frameLeft) + 80)
                .attr("height", (frameBottom - frameTop) + 40)
                .attr("fill", "#1c1917")
                .attr("rx", 20);

            svg.selectAll(".rod-wire")
                .data(columns)
                .enter()
                .append("line")
                .attr("class", "rod-wire")
                .attr("x1", d => d.x)
                .attr("y1", frameTop)
                .attr("x2", d => d.x)
                .attr("y2", frameBottom)
                .attr("stroke", "#64748b")
                .attr("stroke-width", 8);

            svg.append("rect")
                .attr("x", frameLeft - 30)
                .attr("y", frameTop - 15)
                .attr("width", (frameRight - frameLeft) + 60)
                .attr("height", (frameBottom - frameTop) + 30)
                .attr("fill", "none")
                .attr("stroke", "var(--wood)")
                .attr("stroke-width", 24)
                .attr("rx", 12);

            svg.append("rect")
                .attr("x", frameLeft - 42)
                .attr("y", frameTop - 27)
                .attr("width", (frameRight - frameLeft) + 84)
                .attr("height", (frameBottom - frameTop) + 54)
                .attr("fill", "none")
                .attr("stroke", "var(--wood-light)")
                .attr("stroke-width", 4)
                .attr("rx", 16);

            svg.append("line")
                .attr("x1", frameLeft - 30)
                .attr("y1", beamY)
                .attr("x2", frameRight + 30)
                .attr("y2", beamY)
                .attr("stroke", "var(--wood)")
                .attr("stroke-width", 20);

            svg.append("line")
                .attr("x1", frameLeft - 30)
                .attr("y1", beamY)
                .attr("x2", frameRight + 30)
                .attr("y2", beamY)
                .attr("stroke", "var(--wood-light)")
                .attr("stroke-width", 4);

            svg.selectAll(".col-tag")
                .data(columns)
                .enter()
                .append("text")
                .attr("x", d => d.x)
                .attr("y", frameBottom + 45)
                .attr("text-anchor", "middle")
                .attr("fill", "var(--text-muted)")
                .attr("font-size", "1.3rem")
                .attr("font-weight", "bold")
                .text(d => d.text);

            svg.selectAll(".col-val-text")
                .data(columns)
                .enter()
                .append("text")
                .attr("class", "col-val-text")
                .attr("id", d => `val-text-${d.id}`)
                .attr("x", d => d.x)
                .attr("y", frameTop - 30)
                .attr("text-anchor", "middle")
                .attr("fill", d => d.color)
                .attr("font-size", "2.5rem")
                .attr("font-weight", "900")
                .text("0");
        }

        function getUpperY(isActive) {
            return isActive ? (beamY - beadRy - 14) : (frameTop + beadRy + 14);
        }

        function getLowerY(beadIndex, activeCount) {
            const gap = 2;
            const beadHeight = beadRy * 2 + gap;
            if (beadIndex < activeCount) {
                return beamY + beadRy + 14 + (beadIndex * beadHeight);
            } else {
                return frameBottom - beadRy - 14 - ((3 - beadIndex) * beadHeight);
            }
        }

        function computeBeadLayout(targetInteger) {
            let rem = targetInteger;
            const positions = {};
            const divs = { thousands: 1000, hundreds: 100, tens: 10, ones: 1 };
            for (let k in divs) {
                let digit = Math.floor(rem / divs[k]);
                positions[k] = {
                    digit: digit,
                    upperActive: digit >= 5,
                    lowerActiveCount: digit % 5
                };
                rem %= divs[k];
            }
            return positions;
        }

        function compileDataset(layoutState) {
            const list = [];
            columns.forEach(col => {
                const state = layoutState[col.id];
                list.push({
                    id: `${col.id}-upper`,
                    cx: col.x,
                    cy: getUpperY(state.upperActive),
                    color: col.color
                });
                for (let i = 0; i < 4; i++) {
                    list.push({
                        id: `\( {col.id}-lower- \){i}`,
                        cx: col.x,
                        cy: getLowerY(i, state.lowerActiveCount),
                        color: col.color
                    });
                }
            });
            return list;
        }

        function refreshAbacusVisuals(totalValue, runAnimation = true) {
            const currentLayout = computeBeadLayout(totalValue);
            const beadData = compileDataset(currentLayout);

            columns.forEach(col => {
                d3.select(`#val-text-${col.id}`).text(currentLayout[col.id].digit);
            });

            const targetElements = svg.selectAll(".bead-unit")
                .data(beadData, d => d.id);

            const elementsEntered = targetElements.enter()
                .append("g")
                .attr("class", "bead-unit");

            elementsEntered.append("ellipse")
                .attr("class", "bead")
                .attr("rx", beadRx)
                .attr("ry", beadRy)
                .attr("fill", d => d.color)
                .attr("stroke", "#1e2937")
                .attr("stroke-width", 6)
                .attr("cx", d => d.cx)
                .attr("cy", d => d.cy);

            targetElements.select(".bead")
                .transition()
                .duration(runAnimation ? 280 : 0)
                .attr("cy", d => d.cy);

            targetElements.exit().remove();
        }

        // --- Expression Engine ---
        function parseExpression(expr) {
            const tokens = expr.match(/\d+|[+\-]/g) || [];
            let steps = [];
            let runningTotal = 0;
            let currentAggregate = 0;

            for (let i = 0; i < tokens.length; i++) {
                const token = tokens[i];
                if (!isNaN(token)) {
                    const num = parseInt(token);
                    const isAdd = i === 0 || tokens[i-1] === '+';
                    const value = isAdd ? num : -num;
                    
                    runningTotal += value;
                    currentAggregate = runningTotal;

                    steps.push({
                        opText: `\( {isAdd ? '+' : ''} \){num}`,
                        value: value,
                        aggregate: runningTotal
                    });
                }
            }
            return steps;
        }

        function generateRandomExpression(level) {
            const maxDigits = parseInt(level);
            let expr = "";
            let terms = Math.floor(Math.random() * 4) + 3;
            
            for (let i = 0; i < terms; i++) {
                if (i > 0) expr += Math.random() > 0.5 ? " + " : " - ";
                const digits = Math.floor(Math.random() * maxDigits) + 1;
                const max = Math.pow(10, digits) - 1;
                expr += Math.floor(Math.random() * max) + 1;
            }
            return expr;
        }

        function updateTracker() {
            const container = d3.select("#tracker-bar");
            container.html("");
            
            engineSteps.forEach((step, i) => {
                const pill = container.append("div")
                    .attr("class", `tracker-pill ${i === activeStepIndex ? 'active' : ''}`)
                    .attr("id", `pill-${i}`)
                    .text(step.opText);
                
                pill.on("click", () => {
                    if (!isRunning) {
                        activeStepIndex = i;
                        renderActiveStepContext(false);
                    }
                });
            });
        }

        function renderActiveStepContext(animate = false) {
            const activeData = engineSteps[activeStepIndex];
            
            const instructionLabel = d3.select("#current-op");
            instructionLabel.text(activeData.opText);
            
            if (activeData.value > 0) { instructionLabel.style("color", "#4ade80"); }
            else if (activeData.value < 0) { instructionLabel.style("color", "#f87171"); }
            else { instructionLabel.style("color", "#ec4899"); }

            d3.select("#current-total").text(activeData.aggregate);
            refreshAbacusVisuals(activeData.aggregate, animate);
            updateTracker();
        }

        function executeSequenceLoop() {
            if (!isRunning) return;

            if (activeStepIndex >= engineSteps.length - 1) {
                const finalAnswer = engineSteps[activeStepIndex].aggregate;
                
                speak("What is the answer?", () => {
                    if (!isRunning) return;
                    // Increased to 4 seconds with beeps
                    let waitTime = 4000;
                    let beepInterval = setInterval(() => {
                        if (!isRunning) {
                            clearInterval(beepInterval);
                            return;
                        }
                        playBeep();
                    }, 1000);
                    
                    playbackTimer = setTimeout(() => {
                        if (!isRunning) return; 
                        clearInterval(beepInterval);
                        speak(finalAnswer.toString(), () => {
                            isRunning = false;
                            toggleControlButtons();
                        });
                    }, waitTime); 
                });
                return;
            }

            activeStepIndex++;
            renderActiveStepContext(true);

            const activeData = engineSteps[activeStepIndex];
            speak(activeData.opText);

            const delayDuration = parseInt(d3.select("#speed-slider").property("value"), 10);
            playbackTimer = setTimeout(executeSequenceLoop, delayDuration);
        }

        function toggleControlButtons() {
            const playBtn = document.getElementById("btn-play");
            const pauseBtn = document.getElementById("btn-pause");
            
            if (isRunning) {
                playBtn.style.display = "none";
                pauseBtn.style.display = "inline-block";
            } else {
                playBtn.style.display = "inline-block";
                pauseBtn.style.display = "none";
            }
        }

        // Initialize
        drawAbacusShell();

        // Event Listeners
        document.getElementById("btn-play").addEventListener("click", () => {
            let expr = document.getElementById("expr-input").value.trim();
            if (!expr) {
                const level = document.getElementById("level-select").value;
                expr = generateRandomExpression(level);
                document.getElementById("expr-input").value = expr;
            }
            
            engineSteps = parseExpression(expr);
            if (engineSteps.length === 0) return;
            
            activeStepIndex = 0;
            renderActiveStepContext(false);
            
            isRunning = true;
            toggleControlButtons();
            cancelSpeech();
            
            speak("Get Ready", () => {
                if (isRunning) {
                    // Beeps during Get Ready wait (800ms)
                    let waitTime = 800;
                    let beepCount = 0;
                    const beepInterval = setInterval(() => {
                        if (!isRunning || beepCount >= 1) {
                            clearInterval(beepInterval);
                            return;
                        }
                        playBeep();
                        beepCount++;
                    }, 1000);
                    
                    playbackTimer = setTimeout(() => {
                        if (isRunning) executeSequenceLoop();
                    }, waitTime); 
                }
            });
        });

        document.getElementById("btn-pause").addEventListener("click", () => {
            isRunning = false;
            clearTimeout(playbackTimer);
            cancelSpeech();
            toggleControlButtons();
        });

        document.getElementById("btn-reset").addEventListener("click", () => {
            isRunning = false;
            clearTimeout(playbackTimer);
            cancelSpeech();
            activeStepIndex = 0;
            if (engineSteps.length > 0) {
                renderActiveStepContext(false);
            }
            toggleControlButtons();
        });

        document.getElementById("btn-next").addEventListener("click", () => {
            const level = document.getElementById("level-select").value;
            const expr = generateRandomExpression(level);
            document.getElementById("expr-input").value = expr;
            
            if (isRunning) {
                document.getElementById("btn-reset").click();
            }
        });

        document.getElementById("btn-prev").addEventListener("click", () => {
            if (questionHistory.length > 0) {
                historyIndex = Math.max(0, historyIndex - 1);
                document.getElementById("expr-input").value = questionHistory[historyIndex];
            }
        });

        // Keyboard support
        document.addEventListener("keydown", (e) => {
            if (e.key === " " && document.activeElement.tagName !== "INPUT") {
                e.preventDefault();
                const playBtn = document.getElementById("btn-play");
                if (playBtn.style.display !== "none") {
                    playBtn.click();
                } else {
                    document.getElementById("btn-pause").click();
                }
            }
        });

        // Initial setup
        d3.select("#current-op").text("Ready");
    </script>
</body>
</html>
